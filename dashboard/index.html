<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Washville Report Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #154D95 0%, #49B9E6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            padding: 0;
            max-width: 520px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: #C3EFF4;
            padding: 28px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header img {
            height: 100px;
            width: auto;
        }

        .content {
            padding: 36px 40px 40px;
        }

        .page-title {
            color: #154D95;
            font-size: 1.25em;
            font-weight: 500;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #154D95;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 1em;
            font-family: 'Roboto', sans-serif;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.3s;
            color: #333;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #49B9E6;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1em;
            font-family: 'Roboto', sans-serif;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.3s;
            background: white;
            cursor: pointer;
            color: #333;
        }

        select:focus {
            outline: none;
            border-color: #49B9E6;
        }

        select:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 1em;
            font-weight: 500;
            font-family: 'Roboto', sans-serif;
            color: white;
            background: #154D95;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #2066B2;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(21, 77, 149, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: transparent;
            color: #154D95;
            border: 2px solid #154D95;
        }

        button.secondary:hover {
            background: #154D95;
            color: white;
            box-shadow: 0 4px 12px rgba(21, 77, 149, 0.2);
        }

        .message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background-color: #e8f4f8;
            color: #154D95;
            border: 1px solid #49B9E6;
        }

        .message.error {
            background-color: #fef0ec;
            color: #c0392b;
            border: 1px solid #FFB499;
        }

        .message.warning {
            background-color: #fff8f0;
            color: #856404;
            border: 1px solid #FFB499;
            white-space: pre-line;
        }

        .hidden {
            display: none;
        }

        .poi-info {
            font-size: 0.8em;
            color: #606060;
            margin-top: 6px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/washville-logo.png" alt="Washville">
        </div>
        <div class="content">
            <div class="page-title">Report Builder</div>

            <div class="input-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Enter an address" autocomplete="street-address">
            </div>

            <button onclick="handleSearchPois()" id="searchBtn">Search Locations</button>

            <div id="poiSection" class="hidden">
                <div class="input-group">
                    <label for="poiSelect">Select a Reference Location</label>
                    <select id="poiSelect">
                        <option value="">-- Select a location --</option>
                    </select>
                    <div class="poi-info" id="poiInfo"></div>
                </div>

                <button onclick="handleAnalyze()" id="analyzeBtn">Generate Report</button>
                <button onclick="handleReset()" class="secondary">Start Over</button>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        let searchData = null;

        function showMessage(message, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message ${type} show`;
        }

        function hideMessage() {
            const messageEl = document.getElementById('message');
            messageEl.className = 'message';
        }

        function handleReset() {
            searchData = null;
            document.getElementById('poiSection').classList.add('hidden');
            document.getElementById('searchBtn').classList.remove('hidden');
            document.getElementById('address').disabled = false;
            document.getElementById('poiSelect').innerHTML = '<option value="">-- Select a location --</option>';
            document.getElementById('poiInfo').textContent = '';
            hideMessage();
        }

        async function handleSearchPois() {
            const address = document.getElementById('address').value;
            const searchBtn = document.getElementById('searchBtn');

            hideMessage();

            if (!address.trim()) {
                showMessage('Please enter an address', 'error');
                return;
            }

            searchBtn.disabled = true;
            searchBtn.textContent = 'Searching...';

            try {
                const response = await fetch('/api/pipeline/search-pois', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ address })
                });

                if (response.ok) {
                    searchData = await response.json();

                    const poiSelect = document.getElementById('poiSelect');
                    poiSelect.innerHTML = '<option value="">-- Select a location --</option>';

                    searchData.pois.forEach((poi, index) => {
                        const option = document.createElement('option');
                        option.value = index;
                        option.textContent = `${poi.venue.name} - ${poi.venue.address.formattedAddress} (${poi.distance_miles} mi)`;
                        poiSelect.appendChild(option);
                    });

                    document.getElementById('poiSection').classList.remove('hidden');
                    document.getElementById('searchBtn').classList.add('hidden');
                    document.getElementById('address').disabled = true;

                    showMessage(`Found ${searchData.pois.length} locations near ${searchData.formatted_address}. Please select one.`, 'success');
                } else {
                    const errorData = await response.json();
                    console.error('Error:', response.status, errorData);
                    showMessage(errorData.detail || 'Failed to search for locations', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('An error occurred while searching for locations', 'error');
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search Locations';
            }
        }

        document.getElementById('poiSelect').addEventListener('change', function() {
            const poiInfo = document.getElementById('poiInfo');
            if (this.value !== '' && searchData) {
                const poi = searchData.pois[parseInt(this.value)];
                poiInfo.textContent = `${poi.venue.categoryInfo.category} > ${poi.venue.categoryInfo.subCategory}`;
            } else {
                poiInfo.textContent = '';
            }
        });

        async function handleAnalyze() {
            const poiSelect = document.getElementById('poiSelect');
            const analyzeBtn = document.getElementById('analyzeBtn');

            hideMessage();

            if (poiSelect.value === '' || !searchData) {
                showMessage('Please select a location', 'error');
                return;
            }

            const selectedPoi = searchData.pois[parseInt(poiSelect.value)];

            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Generating Report...';

            try {
                const requestBody = {
                    address: searchData.formatted_address,
                    latitude: searchData.latitude,
                    longitude: searchData.longitude,
                    poi_id: selectedPoi.venue.apiId,
                    poi_name: selectedPoi.venue.name
                };

                const response = await fetch('/api/pipeline/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (response.ok) {
                    const blob = await response.blob();

                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = 'market_analysis.xlsx';

                    if (contentDisposition) {
                        const filenameMatch = contentDisposition.match(/filename="?(.+)"?/);
                        if (filenameMatch && filenameMatch[1]) {
                            filename = filenameMatch[1];
                        }
                    }

                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();

                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);

                    // Check for warnings from the API
                    const warningsHeader = response.headers.get('X-Warnings');
                    if (warningsHeader) {
                        try {
                            const warnings = JSON.parse(warningsHeader);
                            if (warnings.length > 0) {
                                const warningText = 'Report downloaded with warnings:\n• ' + warnings.join('\n• ');
                                showMessage(warningText, 'warning');
                                return;
                            }
                        } catch (e) {
                            console.warn('Could not parse warnings header:', e);
                        }
                    }

                    showMessage('Report downloaded successfully!', 'success');
                } else {
                    const errorData = await response.json();
                    console.error('Error:', response.status, errorData);
                    showMessage(errorData.detail || 'Failed to generate report', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('An error occurred while generating the report', 'error');
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = 'Generate Report';
            }
        }

        document.getElementById('address').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSearchPois();
            }
        });
    </script>
</body>
</html>
